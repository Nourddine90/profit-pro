<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة الأرباح</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.box{
    background:#0d1b1e;
    padding:20px;
    border-radius:15px;
    width:300px;
    text-align:center;
    color:white;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.calc{
    background:#00bcd4;
    color:white;
}

.whatsapp{
    background:#25D366;
    color:white;
}

.offer{
    background:#ff9800;
    color:white;
}

.donate{
    background:#ff4d6d;
    color:white;
}

</style>
</head>

<body>

<div class="box">

<h2>💰 حاسبة الأرباح</h2>

<input type="number" id="buy" placeholder="ثمن الشراء">
<input type="number" id="sell" placeholder="ثمن البيع">
<input type="number" id="ship" placeholder="تكلفة التوصيل">

<button class="calc" onclick="calculate()">احسب الربح</button>

<p id="result">الربح: --</p>

<button class="whatsapp" onclick="sendWhatsApp()">إرسال عبر واتساب</button>

<button class="offer" onclick="goOffer()">🔥 طريقة الربح</button>

<p style="font-size:12px;margin-top:10px;">
⚠️ إذا ساعدك التطبيق يمكنك دعمنا
</p>

<button class="donate" onclick="support()">❤️ دعم التطبيق</button>

</div>

<script>

let profit = null;

function calculate(){
    let buy = parseFloat(document.getElementById("buy").value);
    let sell = parseFloat(document.getElementById("sell").value);
    let ship = parseFloat(document.getElementById("ship").value);

    if(isNaN(buy) || isNaN(sell) || isNaN(ship)){
        alert("⚠️ أدخل جميع القيم");
        return;
    }

    profit = sell - buy - ship;

    document.getElementById("result").innerText = "الربح: " + profit + " درهم";
}

function sendWhatsApp(){
    if(profit === null){
        alert("⚠️ احسب الربح أولاً");
        return;
    }

    let msg = "💰 الربح هو: " + profit + " درهم";
    let phone = "212711366556";

    window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg));
}

function goOffer(){
    window.location.href = "offer.html";
}

function support(){
    window.open("https://paypal.me/mixnourddine");
}

</script>

</body>
</html>
